<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Thumper</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f0f2f5;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    /* Language selection overlay */
    .lang-overlay {
      position: fixed;
      inset: 0;
      background: #f0f2f5;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 100;
    }

    .lang-overlay.hidden { display: none; }

    .lang-card {
      background: white;
      border-radius: 24px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.1);
      padding: 48px 40px;
      text-align: center;
      width: 360px;
    }

    .lang-card img {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      object-fit: cover;
      margin-bottom: 20px;
    }

    .lang-card h1 {
      font-size: 22px;
      font-weight: 700;
      color: #1a1a2e;
      margin-bottom: 6px;
    }

    .lang-card p {
      font-size: 14px;
      color: #888;
      margin-bottom: 32px;
    }

    .lang-options {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .lang-option {
      padding: 14px;
      background: #f0f2f5;
      border: 2px solid transparent;
      border-radius: 14px;
      font-size: 15px;
      font-weight: 600;
      color: #1a1a2e;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
    }

    .lang-option:hover {
      background: #e4e6ea;
      border-color: #1a1a2e;
    }

    /* Chat */
    .chat-container {
      width: 680px;
      height: 80vh;
      background: white;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.1);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .chat-header {
      padding: 18px 24px;
      background: #1a1a2e;
      color: white;
      font-size: 16px;
      font-weight: 600;
      letter-spacing: 0.3px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .chat-header span {
      font-size: 12px;
      opacity: 0.6;
      font-weight: 400;
      margin-left: 8px;
    }

    .memory-btn {
      font-size: 12px;
      font-weight: 500;
      color: white;
      opacity: 0.7;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 12px;
      padding: 5px 12px;
      cursor: pointer;
      text-decoration: none;
      transition: opacity 0.2s;
    }

    .memory-btn:hover { opacity: 1; }

    #settings-button {
      display: grid;
      width: 30px;
      height: 30px;
      place-items: center;
      padding: 0;
      font-size: 15px;
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .settings-overlay {
      position: fixed;
      inset: 0;
      z-index: 200;
      display: grid;
      place-items: center;
      padding: 20px;
      background: rgba(12, 13, 22, 0.48);
      backdrop-filter: blur(5px);
    }

    .settings-overlay.hidden { display: none; }

    .settings-card {
      width: min(380px, 100%);
      padding: 26px;
      border-radius: 20px;
      background: white;
      box-shadow: 0 24px 70px rgba(0,0,0,0.22);
    }

    .settings-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
    }

    .settings-head h2 {
      color: #1a1a2e;
      font-size: 20px;
    }

    .settings-close {
      width: 34px;
      height: 34px;
      padding: 0;
      border-radius: 50%;
      color: #606070;
      background: #f0f2f5;
      font-size: 22px;
      line-height: 1;
    }

    .settings-label {
      margin-bottom: 10px;
      color: #777785;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .settings-lang-options {
      display: grid;
      gap: 10px;
    }

    .settings-lang-option {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      padding: 13px 15px;
      border: 1px solid #e5e5ea;
      border-radius: 12px;
      color: #1a1a2e;
      background: white;
      text-align: left;
    }

    .settings-lang-option::after {
      content: "";
      width: 9px;
      height: 9px;
      border: 2px solid #c7c7cf;
      border-radius: 50%;
    }

    .settings-lang-option.active {
      border-color: #1a1a2e;
      background: #f6f6f8;
      font-weight: 700;
    }

    .settings-lang-option.active::after {
      border-color: #1a1a2e;
      background: #1a1a2e;
      box-shadow: inset 0 0 0 2px #f6f6f8;
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .message {
      max-width: 75%;
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.5;
      white-space: pre-wrap;
    }

    .message.user {
      background: #1a1a2e;
      color: white;
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }

    .message.bot {
      background: #f0f2f5;
      color: #1a1a2e;
      border-bottom-left-radius: 4px;
    }

    .bot-row {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      align-self: flex-start;
      max-width: 80%;
    }

    .bot-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      object-fit: cover;
      flex-shrink: 0;
    }

    .memory-tag {
      font-size: 11px;
      color: #888;
      margin-top: 4px;
      align-self: flex-start;
    }

    .input-area {
      display: flex;
      padding: 16px;
      border-top: 1px solid #eee;
      gap: 10px;
    }

    input {
      flex: 1;
      padding: 12px 16px;
      border: 1px solid #ddd;
      border-radius: 24px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus { border-color: #1a1a2e; }

    button {
      padding: 12px 20px;
      background: #1a1a2e;
      color: white;
      border: none;
      border-radius: 24px;
      font-size: 14px;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    button:hover { opacity: 0.85; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }

    .typing {
      align-self: flex-start;
      background: #f0f2f5;
      padding: 12px 16px;
      border-radius: 12px;
      border-bottom-left-radius: 4px;
      font-size: 14px;
      color: #888;
    }

    @media (max-width: 520px) {
      .chat-container { width: 100%; height: 100vh; border-radius: 0; }
      .chat-header { padding: 14px 16px; }
      .memory-btn { padding: 6px 9px; }
      .chat-header span { margin-left: 4px; }
    }
  </style>
</head>
<body>

  <!-- Language selection screen -->
  <div class="lang-overlay" id="lang-overlay">
    <div class="lang-card">
      <img src="/static/thumper.png" alt="Thumper" />
      <h1>Thumper</h1>
      <p>Choose your language · 选择语言 · Sprache wählen</p>
      <div class="lang-options">
        <button class="lang-option" data-lang="en">🇬🇧 English</button>
        <button class="lang-option" data-lang="zh">🇨🇳 中文</button>
        <button class="lang-option" data-lang="de">🇩🇪 Deutsch</button>
      </div>
    </div>
  </div>

  <div class="settings-overlay hidden" id="settings-overlay">
    <section class="settings-card" role="dialog" aria-modal="true" aria-labelledby="settings-title">
      <div class="settings-head">
        <h2 id="settings-title">Settings</h2>
        <button class="settings-close" id="settings-close" type="button" aria-label="Close">×</button>
      </div>
      <p class="settings-label" id="settings-language-label">Language</p>
      <div class="settings-lang-options">
        <button class="settings-lang-option" type="button" data-settings-lang="en">🇬🇧 English</button>
        <button class="settings-lang-option" type="button" data-settings-lang="zh">🇨🇳 中文</button>
        <button class="settings-lang-option" type="button" data-settings-lang="de">🇩🇪 Deutsch</button>
      </div>
    </section>
  </div>

  <!-- Chat -->
  <div class="chat-container">
    <div class="chat-header">
      <div>Thumper <span id="powered">powered by GPT-4o-mini</span></div>
      <div class="header-actions">
        <a class="memory-btn" id="memory-link" href="/memories">🧠 <span id="mem-label">Memories</span></a>
        <button class="memory-btn" id="settings-button" type="button" aria-label="Settings" title="Settings">⚙</button>
      </div>
    </div>
    <div class="messages" id="messages"></div>
    <div class="input-area">
      <input id="input" type="text" placeholder="Type a message..." autofocus />
      <button id="send">Send</button>
    </div>
  </div>

  <script>
    const messagesEl = document.getElementById("messages");
    const inputEl = document.getElementById("input");
    const sendBtn = document.getElementById("send");
    const overlay = document.getElementById("lang-overlay");
    const settingsOverlay = document.getElementById("settings-overlay");
    const settingsButton = document.getElementById("settings-button");
    const settingsClose = document.getElementById("settings-close");

    const UI = {
      en: { placeholder: "Type a message...", send: "Send", memories: "Memories", settings: "Settings", settingsTitle: "Settings", language: "Language", close: "Close", powered: "powered by GPT-4o-mini", remembered: "💾 Remembered:" },
      zh: { placeholder: "输入消息...", send: "发送", memories: "记忆", settings: "设置", settingsTitle: "设置", language: "语言", close: "关闭", powered: "由 GPT-4o-mini 驱动", remembered: "💾 已记住：" },
      de: { placeholder: "Nachricht eingeben...", send: "Senden", memories: "Erinnerungen", settings: "Einstellungen", settingsTitle: "Einstellungen", language: "Sprache", close: "Schließen", powered: "betrieben von GPT-4o-mini", remembered: "💾 Gemerkt:" },
    };

    const savedLang = sessionStorage.getItem("lang");
    let currentLang = savedLang && UI[savedLang] ? savedLang : null;

    function applyLang(lang) {
      if (!UI[lang]) return;
      currentLang = lang;
      sessionStorage.setItem("lang", lang);
      const u = UI[lang];
      inputEl.placeholder = u.placeholder;
      sendBtn.textContent = u.send;
      document.getElementById("powered").textContent = u.powered;
      document.getElementById("mem-label").textContent = u.memories;
      settingsButton.setAttribute("aria-label", u.settings);
      settingsButton.title = u.settings;
      document.getElementById("settings-title").textContent = u.settingsTitle;
      document.getElementById("settings-language-label").textContent = u.language;
      settingsClose.setAttribute("aria-label", u.close);
      document.getElementById("memory-link").href = `/memories?lang=${lang}`;
      document.documentElement.lang = lang === "zh" ? "zh-CN" : lang;
      document.querySelectorAll(".settings-lang-option").forEach(option => {
        const isActive = option.dataset.settingsLang === lang;
        option.classList.toggle("active", isActive);
        option.setAttribute("aria-pressed", String(isActive));
      });
    }

    function openSettings() {
      settingsOverlay.classList.remove("hidden");
      settingsClose.focus();
    }

    function closeSettings() {
      settingsOverlay.classList.add("hidden");
      settingsButton.focus();
    }

    settingsButton.addEventListener("click", openSettings);
    settingsClose.addEventListener("click", closeSettings);
    settingsOverlay.addEventListener("click", event => {
      if (event.target === settingsOverlay) closeSettings();
    });
    document.addEventListener("keydown", event => {
      if (event.key === "Escape" && !settingsOverlay.classList.contains("hidden")) {
        closeSettings();
      }
    });
    document.querySelectorAll(".settings-lang-option").forEach(option => {
      option.addEventListener("click", () => {
        applyLang(option.dataset.settingsLang);
        closeSettings();
      });
    });

    document.querySelectorAll(".lang-option").forEach(btn => {
      btn.addEventListener("click", () => {
        applyLang(btn.dataset.lang);
        overlay.classList.add("hidden");
        sessionStorage.removeItem("chatLog");
        sessionStorage.removeItem("pendingReplyBatch");
        pendingMessages = [];
        greet();
      });
    });

    // Session chat log
    let chatLog = JSON.parse(sessionStorage.getItem("chatLog") || "[]");

    function saveChatLog() {
      sessionStorage.setItem("chatLog", JSON.stringify(chatLog));
    }

    function renderMessage(text, role) {
      const div = document.createElement("div");
      div.className = `message ${role}`;
      div.textContent = text;
      if (role === "bot") {
        const row = document.createElement("div");
        row.className = "bot-row";
        const avatar = document.createElement("img");
        avatar.className = "bot-avatar";
        avatar.src = "/static/thumper.png";
        avatar.alt = "Thumper";
        row.appendChild(avatar);
        row.appendChild(div);
        messagesEl.appendChild(row);
      } else {
        messagesEl.appendChild(div);
      }
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return div;
    }

    function addMessage(text, role) {
      chatLog.push({ type: "message", text, role });
      saveChatLog();
      return renderMessage(text, role);
    }

    function addMemoryTag(memories, lang = currentLang) {
      if (!memories || memories.length === 0) return;
      const label = `${UI[lang].remembered} ${memories.join(" · ")}`;
      chatLog.push({ type: "tag", text: label });
      saveChatLog();
      const div = document.createElement("div");
      div.className = "memory-tag";
      div.textContent = label;
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    async function rememberConversation(userMessages, assistantMessage, lang) {
      try {
        const res = await fetch("/remember", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            user_message: userMessages.join("\n"),
            assistant_message: assistantMessage,
            lang,
          }),
        });
        if (!res.ok) return;
        const data = await res.json();
        addMemoryTag(data.memories_saved, lang);
      } catch (_error) {
        // Memory storage should never delay or interrupt the visible reply.
      }
    }

    function restoreChat() {
      chatLog.forEach(entry => {
        if (entry.type === "message") {
          renderMessage(entry.text, entry.role);
        } else {
          const div = document.createElement("div");
          div.className = "memory-tag";
          div.textContent = entry.text;
          messagesEl.appendChild(div);
        }
      });
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    const QUIET_PERIOD_MS = 800;
    const MAX_BATCH_WAIT_MS = 10000;
    const MAX_MESSAGES_PER_BATCH = 10;
    let replyTimer = null;
    let responseInFlight = false;
    let isComposing = false;
    let lastInputAt = 0;

    let pendingMessages = [];
    let firstPendingAt = 0;
    try {
      const savedBatch = JSON.parse(sessionStorage.getItem("pendingReplyBatch") || "null");
      if (savedBatch && Array.isArray(savedBatch.messages)) {
        pendingMessages = savedBatch.messages.filter(message => typeof message === "string" && message.trim());
        firstPendingAt = Number(savedBatch.firstPendingAt) || Date.now();
        lastInputAt = Number(savedBatch.lastInputAt) || firstPendingAt;
      }
    } catch (_error) {
      sessionStorage.removeItem("pendingReplyBatch");
    }

    function savePendingBatch() {
      if (pendingMessages.length === 0) {
        sessionStorage.removeItem("pendingReplyBatch");
        return;
      }
      sessionStorage.setItem("pendingReplyBatch", JSON.stringify({
        messages: pendingMessages,
        firstPendingAt,
        lastInputAt,
      }));
    }

    function scheduleReply() {
      clearTimeout(replyTimer);
      replyTimer = null;
      if (responseInFlight || pendingMessages.length === 0) return;

      const now = Date.now();
      const maxWaitRemaining = MAX_BATCH_WAIT_MS - (now - firstPendingAt);
      const quietTimeRemaining = QUIET_PERIOD_MS - (now - lastInputAt);
      const userHasDraft = isComposing || inputEl.value.trim().length > 0;

      if (maxWaitRemaining <= 0 || (!userHasDraft && quietTimeRemaining <= 0)) {
        dispatchPendingMessages();
        return;
      }

      const nextCheck = userHasDraft
        ? Math.min(maxWaitRemaining, 500)
        : Math.min(maxWaitRemaining, quietTimeRemaining);
      replyTimer = setTimeout(scheduleReply, Math.max(50, nextCheck));
    }

    function waitUntilUserStopsTyping() {
      return new Promise(resolve => {
        function checkTypingState() {
          const hasDraft = inputEl.value.trim().length > 0;
          const quietTimeRemaining = QUIET_PERIOD_MS - (Date.now() - lastInputAt);

          if (!isComposing && (!hasDraft || quietTimeRemaining <= 0)) {
            resolve();
            return;
          }

          const nextCheck = isComposing
            ? 100
            : Math.max(50, Math.min(quietTimeRemaining, 200));
          setTimeout(checkTypingState, nextCheck);
        }

        checkTypingState();
      });
    }

    async function dispatchPendingMessages() {
      if (responseInFlight || pendingMessages.length === 0) return;

      clearTimeout(replyTimer);
      replyTimer = null;
      responseInFlight = true;
      const batch = pendingMessages.splice(0, MAX_MESSAGES_PER_BATCH);
      const batchLang = currentLang;
      firstPendingAt = pendingMessages.length > 0 ? Date.now() : 0;
      savePendingBatch();

      try {
        const res = await fetch("/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ messages: batch, lang: batchLang }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || "Something went wrong. Please try again.");
        const replies = Array.isArray(data.responses)
          ? data.responses.filter(reply => typeof reply === "string" && reply.trim()).slice(0, 10)
          : (typeof data.response === "string" ? [data.response] : []);
        if (replies.length === 0) throw new Error("The server returned an invalid response.");

        for (let index = 0; index < replies.length; index += 1) {
          await waitUntilUserStopsTyping();
          addMessage(replies[index], "bot");
          if (index < replies.length - 1) {
            await new Promise(resolve => setTimeout(resolve, 180));
          }
        }
        void rememberConversation(batch, replies.join("\n"), batchLang);
      } catch (e) {
        addMessage(e.message || "Something went wrong. Please try again.", "bot");
      } finally {
        responseInFlight = false;
        inputEl.focus();
        scheduleReply();
      }
    }

    function sendMessage() {
      const text = inputEl.value.trim();
      if (!text || sendBtn.disabled) return;

      inputEl.value = "";
      addMessage(text, "user");
      const now = Date.now();
      if (pendingMessages.length === 0) firstPendingAt = now;
      pendingMessages.push(text);
      lastInputAt = now;
      savePendingBatch();
      scheduleReply();
      inputEl.focus();
    }

    sendBtn.addEventListener("click", sendMessage);
    inputEl.addEventListener("input", () => {
      lastInputAt = Date.now();
      savePendingBatch();
      scheduleReply();
    });
    inputEl.addEventListener("compositionstart", () => {
      isComposing = true;
      lastInputAt = Date.now();
      scheduleReply();
    });
    inputEl.addEventListener("compositionend", () => {
      isComposing = false;
      lastInputAt = Date.now();
      savePendingBatch();
      scheduleReply();
    });
    inputEl.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.isComposing && !isComposing) {
        e.preventDefault();
        sendMessage();
      }
    });

    async function greet() {
      sendBtn.disabled = true;

      try {
        const res = await fetch(`/greet?lang=${currentLang}`);
        const data = await res.json();
        addMessage(data.response, "bot");
      } catch (e) {
      }
      sendBtn.disabled = false;
      inputEl.focus();
      scheduleReply();
    }

    // Show language picker on first load; skip if already chosen this session
    if (!currentLang) {
      overlay.classList.remove("hidden");
    } else {
      overlay.classList.add("hidden");
      applyLang(currentLang);
      if (chatLog.length > 0) {
        restoreChat();
        scheduleReply();
      } else {
        greet();
      }
    }
  </script>
</body>
</html>
