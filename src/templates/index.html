<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Thumper</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f0f2f5;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    /* Language selection overlay */
    .lang-overlay {
      position: fixed;
      inset: 0;
      background: #f0f2f5;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 100;
    }

    .lang-overlay.hidden { display: none; }

    .lang-card {
      background: white;
      border-radius: 24px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.1);
      padding: 48px 40px;
      text-align: center;
      width: 360px;
    }

    .lang-card img {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      object-fit: cover;
      margin-bottom: 20px;
    }

    .lang-card h1 {
      font-size: 22px;
      font-weight: 700;
      color: #1a1a2e;
      margin-bottom: 6px;
    }

    .lang-card p {
      font-size: 14px;
      color: #888;
      margin-bottom: 32px;
    }

    .lang-options {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .lang-option {
      padding: 14px;
      background: #f0f2f5;
      border: 2px solid transparent;
      border-radius: 14px;
      font-size: 15px;
      font-weight: 600;
      color: #1a1a2e;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
    }

    .lang-option:hover {
      background: #e4e6ea;
      border-color: #1a1a2e;
    }

    /* Chat */
    .chat-container {
      width: 680px;
      height: 80vh;
      background: white;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.1);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .chat-header {
      padding: 18px 24px;
      background: #1a1a2e;
      color: white;
      font-size: 16px;
      font-weight: 600;
      letter-spacing: 0.3px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .chat-header span {
      font-size: 12px;
      opacity: 0.6;
      font-weight: 400;
      margin-left: 8px;
    }

    .memory-btn {
      font-size: 12px;
      font-weight: 500;
      color: white;
      opacity: 0.7;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 12px;
      padding: 5px 12px;
      cursor: pointer;
      text-decoration: none;
      transition: opacity 0.2s;
    }

    .memory-btn:hover { opacity: 1; }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .message {
      max-width: 75%;
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.5;
      white-space: pre-wrap;
    }

    .message.user {
      background: #1a1a2e;
      color: white;
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }

    .message.bot {
      background: #f0f2f5;
      color: #1a1a2e;
      border-bottom-left-radius: 4px;
    }

    .bot-row {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      align-self: flex-start;
      max-width: 80%;
    }

    .bot-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      object-fit: cover;
      flex-shrink: 0;
    }

    .memory-tag {
      font-size: 11px;
      color: #888;
      margin-top: 4px;
      align-self: flex-start;
    }

    .input-area {
      display: flex;
      padding: 16px;
      border-top: 1px solid #eee;
      gap: 10px;
    }

    input {
      flex: 1;
      padding: 12px 16px;
      border: 1px solid #ddd;
      border-radius: 24px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus { border-color: #1a1a2e; }

    button {
      padding: 12px 20px;
      background: #1a1a2e;
      color: white;
      border: none;
      border-radius: 24px;
      font-size: 14px;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    button:hover { opacity: 0.85; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }

    .typing {
      align-self: flex-start;
      background: #f0f2f5;
      padding: 12px 16px;
      border-radius: 12px;
      border-bottom-left-radius: 4px;
      font-size: 14px;
      color: #888;
    }
  </style>
</head>
<body>

  <!-- Language selection screen -->
  <div class="lang-overlay" id="lang-overlay">
    <div class="lang-card">
      <img src="/static/thumper.png" alt="Thumper" />
      <h1>Thumper</h1>
      <p>Choose your language · 选择语言 · Sprache wählen</p>
      <div class="lang-options">
        <button class="lang-option" data-lang="en">🇬🇧 English</button>
        <button class="lang-option" data-lang="zh">🇨🇳 中文</button>
        <button class="lang-option" data-lang="de">🇩🇪 Deutsch</button>
      </div>
    </div>
  </div>

  <!-- Chat -->
  <div class="chat-container">
    <div class="chat-header">
      <div>Thumper <span id="powered">powered by GPT-4o-mini</span></div>
      <a class="memory-btn" id="memory-link" href="/memories">🧠 <span id="mem-label">Memories</span></a>
    </div>
    <div class="messages" id="messages"></div>
    <div class="input-area">
      <input id="input" type="text" placeholder="Type a message..." autofocus />
      <button id="send">Send</button>
    </div>
  </div>

  <script>
    const messagesEl = document.getElementById("messages");
    const inputEl = document.getElementById("input");
    const sendBtn = document.getElementById("send");
    const overlay = document.getElementById("lang-overlay");

    const UI = {
      en: { placeholder: "Type a message...", send: "Send", thinking: "Thinking...", memories: "Memories", powered: "powered by GPT-4o-mini", remembered: "💾 Remembered:" },
      zh: { placeholder: "输入消息...", send: "发送", thinking: "思考中...", memories: "记忆", powered: "由 GPT-4o-mini 驱动", remembered: "💾 已记住：" },
      de: { placeholder: "Nachricht eingeben...", send: "Senden", thinking: "Denke nach...", memories: "Erinnerungen", powered: "betrieben von GPT-4o-mini", remembered: "💾 Gemerkt:" },
    };

    let currentLang = sessionStorage.getItem("lang") || null;

    function applyLang(lang) {
      currentLang = lang;
      sessionStorage.setItem("lang", lang);
      const u = UI[lang];
      inputEl.placeholder = u.placeholder;
      sendBtn.textContent = u.send;
      document.getElementById("powered").textContent = u.powered;
      document.getElementById("mem-label").textContent = u.memories;
      document.getElementById("memory-link").href = `/memories?lang=${lang}`;
    }

    document.querySelectorAll(".lang-option").forEach(btn => {
      btn.addEventListener("click", () => {
        applyLang(btn.dataset.lang);
        overlay.classList.add("hidden");
        sessionStorage.removeItem("chatLog");
        greet();
      });
    });

    // Session chat log
    let chatLog = JSON.parse(sessionStorage.getItem("chatLog") || "[]");

    function saveChatLog() {
      sessionStorage.setItem("chatLog", JSON.stringify(chatLog));
    }

    function renderMessage(text, role) {
      const div = document.createElement("div");
      div.className = `message ${role}`;
      div.textContent = text;
      if (role === "bot") {
        const row = document.createElement("div");
        row.className = "bot-row";
        const avatar = document.createElement("img");
        avatar.className = "bot-avatar";
        avatar.src = "/static/thumper.png";
        avatar.alt = "Thumper";
        row.appendChild(avatar);
        row.appendChild(div);
        messagesEl.appendChild(row);
      } else {
        messagesEl.appendChild(div);
      }
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return div;
    }

    function addMessage(text, role) {
      chatLog.push({ type: "message", text, role });
      saveChatLog();
      return renderMessage(text, role);
    }

    function addMemoryTag(memories) {
      if (!memories || memories.length === 0) return;
      const label = `${UI[currentLang].remembered} ${memories.join(" · ")}`;
      chatLog.push({ type: "tag", text: label });
      saveChatLog();
      const div = document.createElement("div");
      div.className = "memory-tag";
      div.textContent = label;
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function restoreChat() {
      chatLog.forEach(entry => {
        if (entry.type === "message") {
          renderMessage(entry.text, entry.role);
        } else {
          const div = document.createElement("div");
          div.className = "memory-tag";
          div.textContent = entry.text;
          messagesEl.appendChild(div);
        }
      });
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    async function sendMessage() {
      const text = inputEl.value.trim();
      if (!text || sendBtn.disabled) return;

      inputEl.value = "";
      sendBtn.disabled = true;
      addMessage(text, "user");

      const typingRow = document.createElement("div");
      typingRow.className = "bot-row";
      const typingAvatar = document.createElement("img");
      typingAvatar.className = "bot-avatar";
      typingAvatar.src = "/static/thumper.png";
      typingAvatar.alt = "Thumper";
      const typing = document.createElement("div");
      typing.className = "typing";
      typing.textContent = UI[currentLang].thinking;
      typingRow.appendChild(typingAvatar);
      typingRow.appendChild(typing);
      messagesEl.appendChild(typingRow);
      messagesEl.scrollTop = messagesEl.scrollHeight;

      try {
        const res = await fetch("/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message: text, lang: currentLang }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || "Something went wrong. Please try again.");
        if (typeof data.response !== "string") throw new Error("The server returned an invalid response.");
        typingRow.remove();
        addMessage(data.response, "bot");
        addMemoryTag(data.memories_saved);
      } catch (e) {
        typingRow.remove();
        addMessage(e.message || "Something went wrong. Please try again.", "bot");
      } finally {
        sendBtn.disabled = false;
        inputEl.focus();
      }
    }

    sendBtn.addEventListener("click", sendMessage);
    inputEl.addEventListener("keydown", (e) => { if (e.key === "Enter") sendMessage(); });

    async function greet() {
      sendBtn.disabled = true;
      const typingRow = document.createElement("div");
      typingRow.className = "bot-row";
      const typingAvatar = document.createElement("img");
      typingAvatar.className = "bot-avatar";
      typingAvatar.src = "/static/thumper.png";
      typingAvatar.alt = "Thumper";
      const typing = document.createElement("div");
      typing.className = "typing";
      typing.textContent = UI[currentLang].thinking;
      typingRow.appendChild(typingAvatar);
      typingRow.appendChild(typing);
      messagesEl.appendChild(typingRow);

      try {
        const res = await fetch(`/greet?lang=${currentLang}`);
        const data = await res.json();
        typingRow.remove();
        addMessage(data.response, "bot");
      } catch (e) {
        typingRow.remove();
      }
      sendBtn.disabled = false;
      inputEl.focus();
    }

    // Show language picker on first load; skip if already chosen this session
    if (!currentLang) {
      overlay.classList.remove("hidden");
    } else {
      overlay.classList.add("hidden");
      applyLang(currentLang);
      if (chatLog.length > 0) {
        restoreChat();
      } else {
        greet();
      }
    }
  </script>
</body>
</html>
